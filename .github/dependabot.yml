---
version: 2

updates:
  - package-ecosystem: "devcontainers"
    commit-message:
      include: "scope"
      prefix: ":dependabot: devcontainers"
    cooldown:
      default-days: 7
      exclude:
        - "ghcr.io/ministryofjustice/devcontainer-feature/*"
    directory: "/"
    open-pull-requests-limit: 15
    schedule:
      interval: "daily"
  - package-ecosystem: "docker"
    commit-message:
      include: "scope"
      prefix: ":dependabot: docker"
    cooldown:
      default-days: 7
    directory: "/"
    open-pull-requests-limit: 15
    schedule:
      interval: "daily"
  - package-ecosystem: "github-actions"
    commit-message:
      include: "scope"
      prefix: ":dependabot: github-actions"
    cooldown:
      default-days: 7
      exclude:
        - "ministryofjustice/action*"
        - "ministryofjustice/analytical-platform-github-actions*"
    directory: "/"
    groups:
      analytical-platform-github-actions:
        patterns:
          - "ministryofjustice/analytical-platform-github-actions*"
    open-pull-requests-limit: 15
    schedule:
      interval: "daily"
  - package-ecosystem: "uv"
    commit-message:
      include: "scope"
      prefix: ":dependabot: uv"
    cooldown:
      default-days: 7
    directory: "/"
    open-pull-requests-limit: 15
    schedule:
      interval: "daily"
