---
name: 📟 PagerDuty Rota Notifier

on:
  schedule:
    - cron: "0 7 * * 1-5" # Monday-Friday at 07:00 UTC
  workflow_dispatch:

permissions: {}

jobs:
  pagerduty-rota-notifier:
    name: PagerDuty Rota Notifier
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - pagerduty-schedule-id: POE95CC # Analytical Platform
            slack-channel: C04M8224WCV # analytical-platform
          - pagerduty-schedule-id: PW7Q2MF # Find MoJ Data Daily Support
            slack-channel: C03QZ776JVA # data-catalogue
          - pagerduty-schedule-id: PGMMCDQ # Data Engineering Support HEO_SEO
            slack-channel: CBVUV2613 # data-and-analytics-engineering
          - pagerduty-schedule-id: PAMEXM1 # Data Engineering Support G7
            slack-channel: CBVUV2613 # data-and-analytics-engineering
          - pagerduty-schedule-id: PEZPWMA # Analytics Engineering Support SEO_HEO
            slack-channel: C05RQCR5JTH # dmet-analytics-engineering
          - pagerduty-schedule-id: PHEKY21 # Analytics Engineering Support G7
            slack-channel: C05RQCR5JTH # dmet-analytics-engineering
          - pagerduty-schedule-id: P3MCA8L # em-data-hub-rpta
            slack-channel: C069RF589V4 # em-engineers-moj-madetech
          - pagerduty-schedule-id: PF2LL87 # Infrastructure Automation Team Support In Hours Test
            slack-channel: C09FJNE3WD6 # iat-test
    steps:
      - name: Harden Runner
        id: harden_runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set Up uv
        id: setup_uv
        uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7.2.0

      - name: Run Script
        id: run_script
        run: |
          uv run main.py
        env:
          PAGERDUTY_SCHEDULE_ID: ${{ matrix.pagerduty-schedule-id }}
          PAGERDUTY_TOKEN: ${{ secrets.PAGERDUTY_TOKEN }} # zizmor: ignore[secrets-outside-env] intentionally using repository-level secret
          SLACK_CHANNEL: ${{ matrix.slack-channel }}
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }} # zizmor: ignore[secrets-outside-env] intentionally using repository-level secret
